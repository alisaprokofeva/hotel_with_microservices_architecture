spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:cleaningservice;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: cleaning-service-test-group

reservation-paid-topic: reservations.events
cleaning-assigned-topic: cleaning.events
